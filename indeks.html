<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBD Sadar Bencana</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Orbitron', sans-serif;
    background: radial-gradient(circle at top,#0f2027,#203a43,#000);
    color:white;
}

/* HEADER */
.header {
    text-align:center;
    padding:20px;
    font-size:24px;
    background:rgba(0,0,0,0.9);
    letter-spacing:2px;
}

/* NAVBAR */
nav {
    display:flex;
    justify-content:space-around;
    background:#000;
    padding:10px;
    position:sticky;
    top:0;
    z-index:10;
}

nav button {
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

/* SECTION */
.section {
    display:none;
    padding:15px;
}

.active {
    display:block;
}

/* STATUS */
.status-box {
    text-align:center;
    font-size:28px;
    padding:20px;
    border-radius:15px;
}

.aman {background:green;}
.waspada {background:orange;}
.bahaya {background:red;}

/* CARD */
.card {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    margin:10px 0;
}

/* WAVE */
.wave {
    position:fixed;
    bottom:0;
    width:100%;
    height:100px;
    background:url('https://i.ibb.co/7bKZ1Vh/wave.png');
    animation:wave 10s linear infinite;
}

@keyframes wave {
    from {background-position-x:0;}
    to {background-position-x:1000px;}
}
</style>
</head>

<body>

<div class="header">
🌍 MBD SADAR BENCANA
</div>

<nav>
<button onclick="show('home')">🏠 Home</button>
<button onclick="show('berita')">📰 Berita</button>
<button onclick="show('peta')">🗺️ Peta</button>
<button onclick="show('edukasi')">📘 Edukasi</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<div id="status" class="status-box">Loading...</div>

<div class="card">
<h3>📡 Gempa Terbaru</h3>
<div id="gempa"></div>
</div>

<div class="card">
<h3>📰 Info Cepat</h3>
<div id="beritaHome"></div>
</div>
</div>

<!-- BERITA -->
<div id="berita" class="section">
<h2>Berita Bencana Terbaru</h2>
<div id="beritaFull"></div>
</div>

<!-- PETA -->
<div id="peta" class="section">
<h2>Peta & Info Wilayah</h2>
<iframe width="100%" height="300"
src="https://maps.google.com/maps?q=Maluku%20Barat%20Daya&z=7&output=embed">
</iframe>

<div class="card">
<h3>📰 Update Wilayah</h3>
<div id="beritaPeta"></div>
</div>
</div>

<!-- EDUKASI -->
<div id="edukasi" class="section">
<h2>Edukasi Bencana</h2>

<div class="card">
Gempa: Lindungi kepala & cari tempat aman.
</div>

<div class="card">
Tsunami: Segera ke tempat tinggi.
</div>

<div class="card">
Banjir: Hindari arus deras.
</div>

<div class="card">
<h3>📰 Info Edukasi Terbaru</h3>
<div id="beritaEdukasi"></div>
</div>
</div>

<div class="wave"></div>

<script>

// NAVIGASI
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// STATUS
function cek(g){
    let m = parseFloat(g.Magnitude);
    let d = parseInt(g.Kedalaman);

    if(m >= 7 && d < 70) return {t:"🔴 BAHAYA", c:"bahaya"};
    if(m >= 5) return {t:"🟡 WASPADA", c:"waspada"};
    return {t:"🟢 AMAN", c:"aman"};
}

// GEMPA BMKG
function loadGempa(){
fetch('https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json')
.then(r=>r.json())
.then(d=>{
    let g = d.Infogempa.gempa;
    let s = cek(g);

    document.getElementById("status").innerHTML = s.t;
    document.getElementById("status").className = "status-box " + s.c;

    document.getElementById("gempa").innerHTML = `
    ${g.Tanggal} ${g.Jam}<br>
    Magnitudo: ${g.Magnitude}<br>
    Kedalaman: ${g.Kedalaman}<br>
    Wilayah: ${g.Wilayah}`;
});
}

// BERITA
function loadBerita(){
fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://news.google.com/rss/search?q=bencana+Indonesia'))
.then(r=>r.json())
.then(data=>{
    let parser = new DOMParser();
    let xml = parser.parseFromString(data.contents,"text/xml");
    let items = xml.querySelectorAll("item");

    let top3="", full="";

    items.forEach((el,i)=>{
        let title = el.querySelector("title").textContent;

        if(i<3){
            top3 += `<p>🔹 ${title}</p>`;
        }

        if(i<6){
            full += `<div class="card">🔹 ${title}</div>`;
        }
    });

    document.getElementById("beritaHome").innerHTML = top3;
    document.getElementById("beritaFull").innerHTML = full;
    document.getElementById("beritaPeta").innerHTML = top3;
    document.getElementById("beritaEdukasi").innerHTML = top3;
});
}

// AUTO UPDATE
loadGempa();
loadBerita();

setInterval(loadGempa, 60000); // tiap 1 menit
setInterval(loadBerita, 300000); // tiap 5 menit

</script>

</body>
</html>
